name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-generated-project:
    name: Validate generated project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Install actionlint
        run: |
          mkdir -p "$HOME/.local/bin"
          GOBIN="$HOME/.local/bin" go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate project
        run: |
          uvx copier copy \
            -d project_name=test-project \
            -d 'project_short_description=A great package.' \
            -d python_name=test_project \
            -d url=https://github.com/test-org/test-project \
            -d min_python_version=3.11 \
            -d org=test-org \
            -d 'full_name=Test User' \
            -d email=test@example.com \
            -d license=MIT \
            -d typing=no_typing \
            -d coc=our_coc \
            --vcs-ref HEAD \
            . my-project

      - name: Inject test code
        run: |
          cat <<'PYEOF' > my-project/src/test_project/hello.py
          def greet(name: str) -> str:
              return f"Hello, {name}!"
          PYEOF

          cat <<'PYEOF' > my-project/tests/test_hello.py
          from test_project.hello import greet

          def test_greet():
              assert greet("World") == "Hello, World!"
          PYEOF

      - name: Init git repo in generated project
        run: |
          cd my-project
          git init
          git config user.email "test@example.com"
          git config user.name "Test User"
          git add .
          git commit -m "Initial commit"

      - name: Lint generated workflows
        run: actionlint my-project/.github/workflows/*.yml

      - name: Verify dependencies resolve
        run: uv sync
        working-directory: my-project

      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files
        working-directory: my-project

      - name: Run tests
        run: uv run pytest
        working-directory: my-project

      - name: Run type checker
        run: uvx ty check
        working-directory: my-project

      - name: Build package
        run: uv build
        working-directory: my-project
